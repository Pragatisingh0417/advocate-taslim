<script>
document.addEventListener("DOMContentLoaded", async () => {

    const urlParams = new URLSearchParams(window.location.search);
    const blogId = urlParams.get("id");

    if (!blogId) {
        Swal.fire("Error", "No blog selected", "error")
            .then(() => location.href = "blogs.html");
        return;
    }

    const token = localStorage.getItem("adminToken");
    if (!token) {
        Swal.fire("Unauthorized", "Login first", "error")
            .then(() => location.href = "signin.html");
        return;
    }

    let blog; // ✅ make blog global

    // 🔹 LOAD BLOG
    try {
        const res = await fetch(`http://localhost:8000/api/blogs/${blogId}`, {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        blog = await res.json();
        if (!res.ok) throw new Error(blog.message);

        document.getElementById("heading").value = blog.heading;
        document.getElementById("short_description").value = blog.short_description;
        CKEDITOR.instances.editor.setData(blog.long_description);
        document.getElementById("date").value =
            new Date(blog.date).toISOString().split("T")[0];

        if (blog.image) {
            const preview = document.getElementById("previewImage");
            preview.src = `http://localhost:8000/${blog.image}`;
            preview.style.display = "block";
        }

    } catch (err) {
        Swal.fire("Error", err.message, "error");
        return;
    }

    // 🔹 HANDLE UPDATE
    document.getElementById("editBlogForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        Swal.fire({
            title: "Update Blog?",
            icon: "question",
            showCancelButton: true,
            confirmButtonText: "Yes, update it!"
        }).then(async (result) => {
            if (!result.isConfirmed) return;

            const formData = new FormData();
            formData.append("heading", document.getElementById("heading").value);
            formData.append("short_description", document.getElementById("short_description").value);
            formData.append("long_description", CKEDITOR.instances.editor.getData());
            formData.append("date", document.getElementById("date").value);

            const imageInput = document.getElementById("image");
            if (imageInput.files.length > 0) {
                formData.append("image", imageInput.files[0]);
            }

            try {
                const res = await fetch(`http://localhost:8000/api/blogs/${blogId}`, {
                    method: "PUT",
                    headers: {
                        Authorization: "Bearer " + token
                    },
                    body: formData
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                Swal.fire("Updated!", "Blog updated successfully", "success")
                    .then(() => location.href = "blogs.html");

            } catch (err) {
                Swal.fire("Error", err.message, "error");
            }
        });
    });
});
</script>
