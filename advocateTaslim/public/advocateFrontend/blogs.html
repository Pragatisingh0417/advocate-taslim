                                <div class="card-body">
                                    <div class="live-preview">
                                        <div class="table-responsive table-card">
                                            <table class="table align-middle table-nowrap table-striped-columns mb-0">
                                                <thead class="table-light">
                                                    <tr>
                                                        <th scope="col" style="width: 46px;">
                                                            <div class="form-check">
                                                                <input class="form-check-input" type="checkbox"
                                                                    id="cardtableCheck">
                                                                <label class="form-check-label"
                                                                    for="cardtableCheck"></label>
                                                            </div>
                                                        </th>
                                                        <th scope="col">S.No</th>
                                                        <th scope="col">Heading</th>
                                                        <th scope="col">Date</th>
                                                        <!-- <th scope="col" >Short Description</th>
                                                        <th scope="col">Long Description</th> -->
                                                        <th scope="col">Image</th>
                                                        <th scope="col" style="width: 150px;">Action</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="blogTable">
                                                    <tr>
                                                        <td colspan="6" class="text-center">Loading blogs...</td>
                                                    </tr>
                                                </tbody>

                                            </table>
                                        </div>
                                    </div>
                                </div>


                                <script>
                                    document.addEventListener("DOMContentLoaded", () => {
                                        fetch(`http://localhost:8000/api/blogs`)

                                            .then(res => res.json())
                                            .then(data => {
                                                const table = document.getElementById("blogTable");
                                                table.innerHTML = "";

                                                if (!data || data.length === 0) {
                                                    table.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center">No blogs found</td>
                    </tr>`;
                                                    return;
                                                }

                                                data.forEach((blog, index) => {
                                                    table.innerHTML += `
                    <tr>
                        <td>
                            <input type="checkbox" value="${blog._id}">
                        </td>
                        <td>${index + 1}</td>
                        <td>${blog.heading}</td>
                        <td>${new Date(blog.date).toISOString().split("T")[0]}</td>

                        <td>
                            ${blog.image ? `<img src="http://localhost:8000/${blog.image}" width="50" class="rounded">` : "No Image"}
                        </td>
                        <td>
                            <a href="editBlog.html?id=${blog._id}" 
                                class="btn btn-sm btn-primary"
                                type="button">
                                Edit
                                </a>
                            <button class="btn btn-sm btn-danger"
                                onclick="deleteBlog('${blog._id}')">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
                                                });
                                            })
                                            .catch(err => {
                                                console.error(err);
                                                document.getElementById("blogTable").innerHTML = `
                <tr>
                    <td colspan="6" class="text-center text-danger">
                        Failed to load blogs
                    </td>
                </tr>`;
                                            });
                                    });

                                    // DELETE BLOG
                                    function deleteBlog(id) {
                                        const token = localStorage.getItem("adminToken");

                                        if (!token) {
                                            Swal.fire("Unauthorized", "Please login again", "error");
                                            return;
                                        }

                                        Swal.fire({
                                            title: "Are you sure?",
                                            text: "This blog will be permanently deleted!",
                                            icon: "warning",
                                            showCancelButton: true,
                                            confirmButtonColor: "#d33",
                                            cancelButtonColor: "#3085d6",
                                            confirmButtonText: "Yes, delete it!",
                                            cancelButtonText: "Cancel"
                                        }).then((result) => {
                                            if (result.isConfirmed) {
                                                fetch(`http://localhost:8000/api/blogs/${id}`, {
                                                    method: "DELETE",
                                                    headers: {
                                                        Authorization: `Bearer ${token}`
                                                    }
                                                })
                                                    .then(res => {
                                                        if (!res.ok) throw new Error("Unauthorized");
                                                        return res.json();
                                                    })
                                                    .then(() => {
                                                        Swal.fire({
                                                            title: "Deleted!",
                                                            text: "Blog has been deleted successfully.",
                                                            icon: "success",
                                                            timer: 1500,
                                                            showConfirmButton: false
                                                        }).then(() => {
                                                            location.reload();
                                                        });
                                                    })
                                                    .catch(() => {
                                                        Swal.fire(
                                                            "Error!",
                                                            "Invalid token or delete failed.",
                                                            "error"
                                                        );
                                                    });
                                            }
                                        });
                                    }

                                </script>
